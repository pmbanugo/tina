name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Type-check (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - darwin_arm64
          - linux_amd64
          - linux_arm64
          - windows_amd64
          - freebsd_amd64
    steps:
      - uses: actions/checkout@v6
      - uses: laytan/setup-odin@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release: dev-2026-03
      - name: odin check (${{ matrix.target }})
        run: odin check src/ -strict-style -no-entry-point -define:TINA_SIM=true -define:TINA_ASSERTS=true -target:${{ matrix.target }}

  test-platform:
    name: Platform tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: macos-latest
          - os: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: laytan/setup-odin@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release: dev-2026-03
      - name: Run platform tests
        run: odin test src/ -define:TINA_ASSERTS=true

  test-simulation:
    name: Simulation tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: laytan/setup-odin@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release: dev-2026-03
      - name: Run simulation tests
        run: odin test src/ -define:TINA_SIM=true -define:TINA_ASSERTS=true
